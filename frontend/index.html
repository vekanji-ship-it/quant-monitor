<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化監控中心 | Moji Ai Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: rgba(28, 28, 30, 0.7); --text-primary: #F5F5F7; --text-secondary: #86868B; --up-color: #34C759; --down-color: #FF3B30; }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 40px; padding-bottom: 60px; min-height: 100vh; margin: 0; box-sizing: border-box;}
        
        .main-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; gap: 24px; padding: 0 20px; box-sizing: border-box;}
        .base-card { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); width: 100%; box-sizing: border-box; }
        
        .top-cards-row { display: flex; gap: 24px; width: 100%; justify-content: space-between; }
        .small-card { width: calc(33.333% - 16px); padding: 24px; transition: transform 0.2s ease;}
        .small-card:hover { transform: scale(1.02); }

        .card-title { color: var(--text-secondary); font-size: 14px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;}
        .card-value { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -1px; }
        .card-change { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .up { color: var(--up-color); } .down { color: var(--down-color); }

        .chart-container { width: 100%; height: 180px; margin-top: 16px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--text-secondary); font-size: 14px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 500;}
        td { padding: 12px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 500;}
        tr:last-child td { border-bottom: none; }
        .highlight-buy { color: var(--up-color); font-weight: 600;}
        .news-link { color: #64D2FF; text-decoration: none; transition: 0.2s; }
        .news-link:hover { color: #0A84FF; text-decoration: underline; }

        /* 💡 新增：表格懸停特效與彈窗樣式 */
        .clickable-row { cursor: pointer; transition: background 0.2s ease; }
        .clickable-row:hover { background: rgba(255, 255, 255, 0.08); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 24px; font-size: 28px; cursor: pointer; color: var(--text-secondary); transition: 0.2s;}
        .close-btn:hover { color: white; }
        
        .modal-section { margin-top: 24px; }
        .modal-section h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;}
        .fundamentals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .info-box { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);}
        .info-label { color: var(--text-secondary); font-size: 13px; margin-bottom: 6px; }
        .info-value { color: white; font-size: 20px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="top-cards-row">
            <div class="base-card small-card">
                <div class="card-title">Nasdaq 綜合指數</div>
                <div id="nasdaq-val" class="card-value">--</div>
                <div id="nasdaq-change" class="card-change">--%</div>
            </div>
            <div class="base-card small-card">
                <div class="card-title">費城半導體 SOX</div>
                <div id="sox-val" class="card-value">--</div>
                <div id="sox-change" class="card-change">--%</div>
            </div>
            <div class="base-card small-card">
                <div class="card-title">USD / TWD 匯率</div>
                <div id="twd-val" class="card-value">--</div>
                <div id="twd-change" class="card-change">--%</div>
            </div>
        </div>

        <div class="base-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div class="card-title">台灣加權指數</div>
                    <div id="twii-val" class="card-value" style="font-size: 40px;">Loading...</div>
                </div>
                <div id="twii-change" class="card-change" style="font-size: 20px; margin-bottom: 6px;">--%</div>
            </div>
            <div class="chart-container">
                <canvas id="twiiChart"></canvas>
            </div>
        </div>

        <div class="base-card" style="padding: 20px 24px;">
            <div class="card-title" style="color:var(--text-primary); font-size:16px; text-transform: none; margin-bottom: 16px;">⚙️ 量化參數設定</div>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: center; font-size: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="filter-etf" checked style="accent-color: var(--up-color); width: 18px; height: 18px;">
                    <span>排除 ETF</span>
                </label>
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="filter-5ma" style="accent-color: var(--up-color); width: 18px; height: 18px;">
                    <span>要求站上 5MA (強勢)</span>
                </label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span>市值下限：</span>
                    <select id="filter-cap" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 6px; outline: none; cursor: pointer;">
                        <option value="0" style="color: black;">不限</option>
                        <option value="50" selected style="color: black;">50 億</option>
                        <option value="100" style="color: black;">100 億</option>
                        <option value="200" style="color: black;">200 億</option>
                    </select>
                </div>
                <button id="btn-search" style="background: var(--up-color); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-left: auto; transition: 0.2s;">套用並掃描</button>
            </div>
        </div>

        <div class="base-card">
            <div class="card-title" style="color:var(--text-primary); font-size:20px; text-transform: none;">本日動能清單 (依參數篩選，點擊可看基本面)</div>
            <table>
                <thead><tr><th>代號</th><th>名稱</th><th>三大法人買超 (張)</th><th>市值 (億)</th></tr></thead>
                <tbody id="stock-list-body"><tr><td colspan="4" style="text-align: center; color: var(--text-secondary);">系統運算中...</td></tr></tbody>
            </table>
        </div>

        <div class="base-card">
            <div class="card-title" style="color:var(--text-primary); font-size:20px; text-transform: none; display:flex; align-items:center; gap:8px;">✨ AI 盤前動能解析</div>
            <div id="ai-report-content" style="font-size: 16px; line-height: 1.6; color:var(--text-primary);">籌碼分析中，請稍候...</div>
        </div>

        <div class="base-card">
            <div class="card-title" style="color:var(--text-primary); font-size:20px; text-transform: none;">📰 每日財經頭條</div>
            <ul id="news-list" style="padding-left: 20px; line-height: 1.8; margin: 0; font-size: 16px; color:var(--text-primary);">
                <li style="color: var(--text-secondary);">新聞載入中...</li>
            </ul>
        </div>

    </div>

    <div id="stock-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content base-card" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal(event)">&times;</span>
            <div id="modal-title" style="font-size: 24px; font-weight: 700; color: white;">載入中...</div>
            
            <div class="modal-section">
                <h3>📊 籌碼與基本面健檢</h3>
                <div id="modal-fundamentals" class="fundamentals-grid">
                    </div>
            </div>
            
            <div class="modal-section">
                <h3>📰 專屬標的新聞</h3>
                <ul id="modal-news" style="padding-left: 20px; line-height: 1.8; margin: 0; font-size: 15px; color:var(--text-primary);">
                    </ul>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
