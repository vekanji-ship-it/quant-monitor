<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化監控中心 | Moji Ai Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 蘋果風格全域設定 */
        :root { --bg-color: #000000; --card-bg: rgba(28, 28, 30, 0.7); --text-primary: #F5F5F7; --text-secondary: #86868B; --up-color: #34C759; --down-color: #FF3B30; }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 40px; padding-bottom: 60px; min-height: 100vh; margin: 0; box-sizing: border-box;}
        
        /* 總容器，確保所有內容置中對齊 */
        .main-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; gap: 24px; padding: 0 20px; box-sizing: border-box;}

        /* 風格不變的通用卡片設置 */
        .base-card { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); width: 100%; box-sizing: border-box; }
        
        /* 第一列：三個排在上列 */
        .top-cards-row { display: flex; gap: 24px; width: 100%; justify-content: space-between; }
        .small-card { width: calc(33.333% - 16px); padding: 24px; transition: transform 0.2s ease;}
        .small-card:hover { transform: scale(1.02); }

        .card-title { color: var(--text-secondary); font-size: 14px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;}
        .card-value { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -1px; }
        .card-change { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .up { color: var(--up-color); } .down { color: var(--down-color); }

        /* K 線圖畫布樣式 */
        .chart-container { width: 100%; height: 180px; margin-top: 16px; }

        /* 表格與列表樣式 */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--text-secondary); font-size: 14px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 500;}
        td { padding: 12px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 500;}
        tr:last-child td { border-bottom: none; }
        .highlight-buy { color: var(--up-color); font-weight: 600;}
        .news-link { color: #64D2FF; text-decoration: none; transition: 0.2s; }
        .news-link:hover { color: #0A84FF; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="top-cards-row">
            <div class="base-card small-card">
                <div class="card-title">Nasdaq 綜合指數</div>
                <div id="nasdaq-val" class="card-value">--</div>
                <div id="nasdaq-change" class="card-change">--%</div>
            </div>
            <div class="base-card small-card">
                <div class="card-title">費城半導體 SOX</div>
                <div id="sox-val" class="card-value">--</div>
                <div id="sox-change" class="card-change">--%</div>
            </div>
            <div class="base-card small-card">
                <div class="card-title">USD / TWD 匯率</div>
                <div id="twd-val" class="card-value">--</div>
                <div id="twd-change" class="card-change">--%</div>
            </div>
        </div>

        <div class="base-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div class="card-title">台灣加權指數</div>
                    <div id="twii-val" class="card-value" style="font-size: 40px;">Loading...</div>
                </div>
                <div id="twii-change" class="card-change" style="font-size: 20px; margin-bottom: 6px;">--%</div>
            </div>
            <div class="chart-container">
                <canvas id="twiiChart"></canvas>
            </div>
        </div>

        <div class="base-card">
            <div class="card-title" style="color:var(--text-primary); font-size:20px; text-transform: none;">本日中型股動能清單 (市值50億+、法人買超)</div>
            <table>
                <thead><tr><th>代號</th><th>名稱</th><th>三大法人買超 (張)</th><th>市值 (億)</th></tr></thead>
                <tbody id="stock-list-body"><tr><td colspan="4" style="text-align: center; color: var(--text-secondary);">系統運算中...</td></tr></tbody>
            </table>
        </div>

        <div class="base-card">
            <div class="card-title" style="color:var(--text-primary); font-size:20px; text-transform: none; display:flex; align-items:center; gap:8px;">✨ AI 盤前動能解析</div>
            <div id="ai-report-content" style="font-size: 16px; line-height: 1.6; color:var(--text-primary);">籌碼分析中，請稍候...</div>
        </div>

        <div class="base-card">
            <div class="card-title" style="color:var(--text-primary); font-size:20px; text-transform: none;">📰 每日財經頭條</div>
            <ul id="news-list" style="padding-left: 20px; line-height: 1.8; margin: 0; font-size: 16px; color:var(--text-primary);">
                <li style="color: var(--text-secondary);">新聞載入中...</li>
            </ul>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
