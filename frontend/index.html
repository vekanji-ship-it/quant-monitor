<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化監控中心</title>
    <style>
        /* 蘋果風格全域設定 */
        :root {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --text-primary: #F5F5F7;
            --text-secondary: #86868B;
            --up-color: #34C759;
            --down-color: #FF3B30;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column; 
            align-items: center;
            padding-top: 60px; 
            padding-bottom: 60px;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }

        /* 儀表板容器 (💡 修改：加入 flex-wrap 讓 4 張卡片能漂亮排版) */
        .dashboard {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px; 
            max-width: 960px;
        }

        /* 毛玻璃卡片設計 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            width: 200px; /* 💡 稍微縮小寬度，讓一行能塞下更多卡片 */
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card-title {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
        }

        .card-change {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .up { color: var(--up-color); }
        .down { color: var(--down-color); }

        /* 表格與區塊共用設計 */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 870px; /* 💡 對齊卡片總寬度 */
            margin-bottom: 24px;
            box-sizing: border-box;
        }

        .section-title {
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:last-child td { border-bottom: none; }
        .highlight-buy { color: var(--up-color); font-weight: 600;}

        /* 💡 新增：新聞連結樣式 */
        .news-link {
            color: #64D2FF;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .news-link:hover {
            color: #0A84FF;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">台灣加權指數</div>
            <div id="twii-val" class="card-value">Loading...</div>
            <div id="twii-change" class="card-change">--%</div>
        </div>

        <div class="card">
            <div class="card-title">Nasdaq 綜合指數</div>
            <div id="nasdaq-val" class="card-value">Loading...</div>
            <div id="nasdaq-change" class="card-change">--%</div>
        </div>

        <div class="card">
            <div class="card-title">費城半導體 SOX</div>
            <div id="sox-val" class="card-value">Loading...</div>
            <div id="sox-change" class="card-change">--%</div>
        </div>

        <div class="card">
            <div class="card-title">USD / TWD 匯率</div>
            <div id="twd-val" class="card-value">Loading...</div>
            <div id="twd-change" class="card-change">--%</div>
        </div>
    </div>

    <div class="table-container" style="margin-top: 0;">
        <div class="section-title" style="display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 24px;">✨</span> AI 盤前動能解析
        </div>
        <div id="ai-report-content" style="color: var(--text-primary); font-size: 16px; line-height: 1.6; letter-spacing: 0.5px;">
            系統正在分析籌碼結構與總經數據，請稍候...
        </div>
    </div>

    <div class="table-container">
        <div class="section-title">📰 每日財經頭條</div>
        <ul id="news-list" style="padding-left: 20px; line-height: 1.8; margin: 0; font-size: 16px;">
            <li style="color: var(--text-secondary);">新聞載入中...</li>
        </ul>
    </div>

    <div class="table-container">
        <div class="section-title">本日中型股動能清單 (市值50億+、法人買超)</div>
        <table>
            <thead>
                <tr>
                    <th>代號</th>
                    <th>名稱</th>
                    <th>三大法人買超 (張)</th>
                    <th>市值 (億)</th>
                </tr>
            </thead>
            <tbody id="stock-list-body">
                <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-secondary);">系統正在進行雲端運算與籌碼分析，約需 10 秒...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
